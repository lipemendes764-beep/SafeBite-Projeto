<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeBite - Cardápio por Restaurante</title>
    <link rel="stylesheet" href="../../src/public/assets/css/cardapiorestaurantes.css">
</head>

<body>

    <nav class="nav">
        <div class="nav-inner">

            <a class="brand" href="HomePage.html">
                <span class="brand-dot">S</span>
                SafeBite
            </a>

            <div class="nav-links">
                <a class="nav-link" href="HomePage.html">Início</a>
                <a class="nav-link" href="restaurantes.html">Restaurantes</a>
                <a class="nav-link active" href="#">Cardápio</a>
            </div>

        </div>
    </nav>

    <div class="wrap">

        <div class="glow"></div>

        <div class="eyebrow">
            ▣ Cardápio dos Restaurantes
        </div>

        <h1>Cardápio por Restaurante</h1>

        <p class="lead">
            Consulte os pratos disponíveis em cada restaurante cadastrado.
        </p>

        <div class="grid">

            <section class="card">

                <h2>Selecionar Restaurante</h2>

                <div class="field">

                    <label>Restaurante</label>

                    <select id="restaurantSelect">
                        <option value="">
                            Escolha um restaurante
                        </option>
                    </select>

                </div>

            </section>

            <section class="card">

                <div class="list-head">

                    <h2>Pratos Disponíveis</h2>

                    <span class="badge" id="count">
                        0 pratos
                    </span>

                </div>

                <div id="cardapio">

                    <div class="empty">
                        Selecione um restaurante.
                    </div>

                </div>

            </section>

        </div>

    </div>

   <script src="../public/assets/js/cardapiorestaurantes.js"></script>
</body>

</html>
