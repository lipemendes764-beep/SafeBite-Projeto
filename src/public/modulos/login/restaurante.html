<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Restaurante — SafeBite</title>
  <link rel="stylesheet" href="../../assets/css/safebite.css"/>
  
</head>
<body>
<nav class="nav" role="navigation">
  <div class="nav-inner">
    <a class="brand" href="Home.html">
      <span class="brand-dot">S</span><span>SafeBite</span>
    </a>
    <div class="nav-search" role="search">
      <i class="nav-search-icon" aria-hidden="true">🔎</i>
      <input id="globalSearch" class="nav-search-input" type="search"
        placeholder="Buscar restaurantes ou pratos…"
        autocomplete="off" aria-label="Buscar" aria-controls="globalSearchResults" />
      <div id="globalSearchResults" class="nav-search-results" role="listbox"></div>
    </div>
    <div class="nav-links" id="navLinks">
      <a class="nav-link" href="Home.html">Início</a>
      <a class="nav-link" href="mapa.html">🗺 Mapa</a>
      <a class="nav-link" href="favoritos.html" id="navFavoritos" style="display:none">❤ Favoritos</a>
      <a class="nav-link" href="perfil.html" id="navPerfil" style="display:none">👤 Perfil</a>
      <a class="nav-link" href="admin.html" id="navAdmin" style="display:none">⚙ Admin</a>
      <a class="nav-link" href="log.html" id="navLogin">Entrar</a>
      <a class="nav-link" href="#" id="navLogout" style="display:none"
        ><span id="navUser"></span> · Sair</a>
      <a class="nav-cart" href="carrinho.html" aria-label="Carrinho">
        🛒 <span class="nav-cart-count" id="navCartCount" style="display:none">0</span>
      </a>
    </div>
    <button class="nav-hamburger" id="hamburger" aria-label="Menu">☰</button>
  </div>
</nav>

<div class="wrap" style="max-width:62rem">
  <!-- Banner -->
  <div id="restBanner"></div>

  <!-- Info do restaurante -->
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin:1.25rem 0 .5rem">
    <div>
      <h1 id="restName" style="margin:0 0 .25rem">…</h1>
      <p id="restCuisine" class="muted" style="margin:0"></p>
    </div>
    <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
      <span id="restStatusBadge"></span>
      <button class="btn ghost fav-btn" id="btnFavRest" title="Favoritar restaurante">🤍 Favoritar restaurante</button>
      <a class="btn primary" href="carrinho.html">🛒 Ver carrinho</a>
    </div>
  </div>

  <div class="rest-info-bar" id="restInfoBar"></div>
  <p id="restDesc" class="muted" style="margin-bottom:2rem;line-height:1.6"></p>

  <!-- Tabs: Cardápio / Info -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="menu">🍽 Cardápio</button>
    <button class="tab-btn" data-tab="info">ℹ Informações</button>
  </div>

  <div class="tab-panel active" id="tab-menu">
    <!-- Categorias -->
    <div id="menuCatFilter" style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem"></div>
    <div id="menuGrid" class="cards"></div>
  </div>

  <div class="tab-panel" id="tab-info">
    <div class="card" style="max-width:480px">
      <h3>Contato &amp; funcionamento</h3>
      <div id="restInfoDetails"></div>
    </div>
  </div>
</div>

<!-- Modal do prato -->
<div class="modal" id="dishModal" role="dialog" aria-modal="true" aria-labelledby="dishModalTitle">
  <div class="modal-box">
    <header class="modal-head">
      <h3 id="dishModalTitle">Detalhes</h3>
      <button class="modal-close" id="dishModalClose">✕</button>
    </header>
    <div class="modal-body" id="dishModalBody"></div>
  </div>
</div>

  <script src="../../assets/js/core.js"></script>
  <script src="../../assets/js/search.js"></script>
  <script src="../../assets/js/restaurante.js"></script>

</body>
</html>
