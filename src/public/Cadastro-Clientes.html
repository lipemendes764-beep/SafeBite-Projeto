<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SafeBite — Cadastro de Clientes</title>
    <link rel="stylesheet" href="assets/css/cadastro-cliente.css" />
</head>

<body>
    <nav class="nav">
        <div class="nav-inner"> <a class="brand" href="home.html"><span class="brand-dot">S</span> SafeBite</a>
            <div class="nav-links"> <a class="nav-link" href="home.html">Início</a> <a class="nav-link"
                    href="restaurantes.html">Restaurantes</a> <a class="nav-link"
                    href="cadastrode restarurante.html">Cadastrar</a> <a class="nav-link"
                    href="pesquisa-alimentos.html">Alimentos</a> <a class="nav-link active"
                    href="cadastrocliente.html">Clientes</a> <a class="nav-link" href="cadastro-prato.html">Pratos</a>
                <a class="nav-link" href="registro-venda.html">Vendas</a> <a class="nav-link"
                    href="perfil.html">Perfil</a> </div>
        </div>
    </nav>
    <div class="wrap">
        <div class="glow"></div>
        <div class="eyebrow">▣ Gestão</div>
        <h1>Cadastro de Clientes</h1>
        <p class="lead">Registre clientes com suas restrições alimentares e endereço de entrega.</p>
        <div class="grid">
            <form class="card" id="form">
                <div class="section-title">Dados pessoais</div>
                <div class="field"><label>Nome completo <span class="req">*</span></label><input class="input"
                        name="name" required /></div>
                <div class="field"><label>E-mail <span class="req">*</span></label><input class="input" type="email"
                        name="email" required /></div>
                <div class="field row2">
                    <div><label>Telefone</label><input class="input" name="phone" placeholder="(11) 99999-0000" /></div>
                    <div><label>Data nasc.</label><input class="input" type="date" name="birthDate" /></div>
                </div>
                <div class="section-title">Endereço</div>
                <div class="field"><label>CEP</label><input class="input" name="zip" placeholder="00000-000" /></div>
                <div class="field row3">
                    <div><label>Rua</label><input class="input" name="street" /></div>
                    <div><label>Bairro</label><input class="input" name="neighborhood" /></div>
                    <div><label>Número</label><input class="input" name="number" /></div>
                </div>
                <div class="field"><label>Complemento</label><input class="input" name="complement"
                        placeholder="Apto, bloco..." /></div>
                <div class="field row2">
                    <div><label>Cidade</label><input class="input" name="city" /></div>
                    <div><label>UF</label><input class="input" name="state" maxlength="2" placeholder="SP" /></div>
                </div>
                <div class="section-title">Restrições</div>
                <fieldset>
                    <legend>Selecione todas que se aplicam</legend>
                    <div class="chips" id="chips"></div>
                </fieldset>
                <div id="msg"></div> <button class="submit" type="submit">Cadastrar cliente</button>
            </form>
            <section>
                <div class="list-head">
                    <h2 style="margin:0">Cadastrados</h2><span class="badge" id="count">0</span>
                </div>
                <div id="list"></div>
            </section>
        </div>
    </div>
    <script src="assets/js/cadastrocliente.js"></script>
</body>

</html>
