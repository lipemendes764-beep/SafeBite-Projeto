<div class="wrap">
 <div class="glow"></div>
 <div class="eyebrow">▣ Gestão</div>
 <h1>Cadastro de Alimentos e Pratos</h1>
 <p class="lead">Registre pratos vinculados a um restaurante, com suas
restrições e alergênicos.</p>
 <div class="grid">
 <form class="card" id="form">
 <div class="field"><label>Nome do prato <span
class="req">*</span></label><input class="input" name="name" required /></div>
 <div class="field"><label>Descrição</label><textarea name="description"
rows="3" placeholder="Ingredientes, preparo..."></textarea></div>
 <div class="field row2">
 <div><label>Preço (R$) <span class="req">*</span></label><input
class="input" type="number" step="0.01" min="0" name="price" required /></div>
 <div><label>Restaurante <span class="req">*</span></label><select
name="restaurantId" id="restaurantSel"></select></div>
 </div>
 <div class="field"><label>Alergênicos / observações</label><input
class="input" name="allergens" placeholder="Contém amendoim, traços de
soja..." /></div>
 <fieldset><legend>Restrições atendidas</legend><div class="chips"
id="chips"></div></fieldset>
 <div id="msg"></div>
 <button class="submit" type="submit">Cadastrar prato</button>
 </form>
 <section>
 <div class="list-head"><h2 style="margin:0">Cadastrados</h2><span
class="badge" id="count">0</span></div>
 <div id="list"></div>
 </section>
 </div>
</div>
<script src="assets/js/cadastro-de-alimentos-pratos.js"></script>
</body>
</html>
