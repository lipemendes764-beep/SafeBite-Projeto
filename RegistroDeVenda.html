<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SafeBite Registro de Venda de Pratos</title>
  <link rel="stylesheet" href="assets/css/RegistroDeVendas.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="home.html">
        <span class="brand-dot">S</span> SafeBite
      </a>
      <div class="nav-links">
        <a class="nav-link" href="home.html">Início</a>
        <a class="nav-link" href="restaurantes.html">Restaurantes</a>
        <a class="nav-link" href="cadastrode restarurante.html">Cadastrar</a>
        <a class="nav-link" href="pesquisa-alimentos.html">Alimentos</a>
        <a class="nav-link" href="cadastrocliente.html">Clientes</a>
        <a class="nav-link" href="cadastro-prato.html">Pratos</a>
        <a class="nav-link active" href="registro-venda.html">Vendas</a>
        <a class="nav-link" href="perfil.html">Perfil</a>
      </div>
    </div>
  </nav>
  <div class="wrap">
    <div class="glow"></div>
    <div class="eyebrow">Gestão</div>
    <h1>Registro de Venda de Pratos</h1>
    <p class="lead">Acompanhe os pedidos pagos e a faturar, vinculando cliente e prato.</p>
    <div class="kpis">
      <div class="kpi">
        <div class="kpi-label">Total vendido</div>
        <div class="kpi-value" id="kpi-total">R$ 0,00</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Pago</div>
        <div class="kpi-value" id="kpi-paid">R$ 0,00</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">A receber</div>
        <div class="kpi-value" id="kpi-due">R$ 0,00</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Pedidos</div>
        <div class="kpi-value" id="kpi-count">0</div>
      </div>
    </div>

    <div class="grid">
      <form class="card" id="form">
        <div class="field">
          <label>Cliente <span class="req">*</span></label>
          <select name="clientId" id="cli"></select>
        </div>
        <div class="field">
          <label>Prato <span class="req">*</span></label>
          <select name="dishId" id="dish"></select>
        </div>
        <div class="field row2">
          <div>
            <label>Quantidade</label>
            <input class="input" type="number" value="1" min="1" name="quantity" />
          </div>
          <div>
            <label>Pagamento</label>
            <select name="paymentMethod">
              <option value="pix" style="background: #161c18">PIX</option>
              <option value="credito" style="background:#161c18">Crédito</option>
              <option value="debito" style="background: #161c18">Débito</option>
              <option value="dinheiro" style="background:#161c18">Dinheiro</option>
            </select>
          </div>
        </div>
        <div class="total">
          <span class="total-label">Total estimado</span>
          <span class="total-value" id="total">R$ 0,00</span>
        </div>
        <label class="toggle">
          <input type="checkbox" name="paid" id="paid" /> Pago
        </label>
        <div id="msg"></div>
        <button class="submit" type="submit">Registrar venda</button>
      </form>
      <section>
        <div class="list-head">
          <h2 style="margin:0">Histórico</h2>
          <span class="badge" id="count">0</span>
        </div>
        <div id="list"></div>
      </section>
    </div>
  </div>
  <script src="assets/js/RegistroDeVendas.js"></script>
</body>
</html>
